<body>
<div id="app"></div>
<div class="toast" id="toast"><i class="ti ti-check" style="color:#2a9d6e"></i> <span id="toast-msg"></span></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ─── Constants ────────────────────────────────────────────────────
const MANUAL_TYPES  = ["Smoke testing","Exploratory testing","Bug creation","Bug verification"];
const AUTO_TYPES    = ["Script development"];
const MEETING_TYPES = ["Client meeting","Daily standup","Weekly standup","Internal sync","Review meeting","Other"];

// ─── Firebase init ────────────────────────────────────────────────
let db = null;
let firebaseReady = false;
try {
  if (FIREBASE_CONFIG.databaseURL && !FIREBASE_CONFIG.databaseURL.includes("PASTE_YOUR")) {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    firebaseReady = true;
  }
} catch(e) { console.warn("Firebase not configured:", e); }

// ─── DB helpers ───────────────────────────────────────────────────
async function loadSubmissions() {
  if (!firebaseReady) {
    try { return JSON.parse(localStorage.getItem("pt_subs") || "[]"); } catch { return []; }
  }
  const snap = await db.ref("submissions").get();
  if (!snap.exists()) return [];
  const obj = snap.val();
  return Object.values(obj).sort((a,b) => a.submittedAt > b.submittedAt ? -1 : 1);
}

async function addSubmission(payload) {
  if (!firebaseReady) {
    const arr = await loadSubmissions();
    arr.unshift(payload);
    localStorage.setItem("pt_subs", JSON.stringify(arr));
    return;
  }
  await db.ref("submissions/" + payload.id).set(payload);
}

async function updateSubmission(payload) {
  if (!firebaseReady) {
    const arr = await loadSubmissions();
    const idx = arr.findIndex(s => s.id === payload.id);
    if (idx >= 0) arr[idx] = payload;
    localStorage.setItem("pt_subs", JSON.stringify(arr));
    return;
  }
  await db.ref("submissions/" + payload.id).set(payload);
}

async function deleteSubmission(id) {
  if (!firebaseReady) {
    const arr = (await loadSubmissions()).filter(s => s.id !== id);
    localStorage.setItem("pt_subs", JSON.stringify(arr));
    return;
  }
  await db.ref("submissions/" + id).remove();
}

function listenSubmissions(cb) {
  if (!firebaseReady) return () => {};
  const ref = db.ref("submissions");
  const handler = snap => {
    if (!snap.exists()) { cb([]); return; }
    const obj = snap.val();
    cb(Object.values(obj).sort((a,b) => a.submittedAt > b.submittedAt ? -1 : 1));
  };
  ref.on("value", handler);
  return () => ref.off("value", handler);
}

// ─── Utilities ────────────────────────────────────────────────────
function uid() { return "s_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }
function showToast(msg) {
  const t = document.getElementById("toast");
  document.getElementById("toast-msg").textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
function el(tag, attrs={}, children=[]) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => { if (c != null) e.appendChild(typeof c === "string" ? document.createTextNode(c) : c); });
  return e;
}

// ─── APP STATE ────────────────────────────────────────────────────
let currentView = "landing"; // landing | associate | success | login | master
let submittedEntry = null;

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.className = currentView === "master" ? "wide" : "";
  if (currentView === "landing")   app.appendChild(renderLanding());
  if (currentView === "associate") app.appendChild(renderAssociateForm());
  if (currentView === "success")   app.appendChild(renderSuccess());
  if (currentView === "login")     app.appendChild(renderLogin());
  if (currentView === "master")    app.appendChild(renderMaster());
}

// ─── LANDING ─────────────────────────────────────────────────────
function renderLanding() {
  const wrap = document.createElement("div");
  wrap.className = "landing";
  wrap.innerHTML = `
    <div class="landing-icon"><i class="ti ti-chart-bar"></i></div>
    <h1>Daily productivity tracker</h1>
    <p>Are you filling in your daily log, or accessing the master dashboard?</p>
    <div class="landing-btns">
      <button class="btn-submit" id="btn-assoc"><i class="ti ti-edit"></i> Fill my daily form</button>
      <button class="btn btn-outline" id="btn-master" style="padding:12px 24px;font-size:14px;"><i class="ti ti-layout-dashboard"></i> Master dashboard</button>
    </div>`;
  wrap.querySelector("#btn-assoc").onclick = () => { currentView = "associate"; render(); };
  wrap.querySelector("#btn-master").onclick = () => { currentView = "login"; render(); };
  return wrap;
}

// ─── ASSOCIATE FORM ───────────────────────────────────────────────
let aTests    = [];
let aMeetings = [];

function renderAssociateForm() {
  if (!aTests.length)    aTests    = [{ id: uid(), name: "", type: MANUAL_TYPES[0], hours: "" }];
  if (!aMeetings.length) aMeetings = [{ id: uid(), name: "", mtype: MEETING_TYPES[0], hours: "" }];

  const wrap = document.createElement("div");

  const calcHours = () => {
    const tH = aTests.reduce((s,t)=>s+(parseFloat(t.hours)||0),0);
    const mH = aMeetings.reduce((s,m)=>s+(parseFloat(m.hours)||0),0);
    const wd = parseFloat(wrap.querySelector("#wd")?.value)||9;
    wrap.querySelector("#t-total").textContent  = tH.toFixed(1)+" hrs";
    wrap.querySelector("#m-total").textContent  = mH.toFixed(1)+" hrs";
    wrap.querySelector("#s-test").textContent   = tH.toFixed(1);
    wrap.querySelector("#s-meet").textContent   = mH.toFixed(1);
    wrap.querySelector("#s-other").textContent  = Math.max(0,wd-tH-mH).toFixed(1);
    wrap.querySelector("#warn").style.display   = (tH+mH>wd)?"flex":"none";
  };

  const rebuildTests = () => {
    const list = wrap.querySelector("#test-list");
    list.innerHTML = "";
    aTests.forEach(t => {
      const row = document.createElement("div");
      row.className = "row-item test-grid";
      row.innerHTML = `
        <input class="name-in" placeholder="e.g. Login regression" value="${t.name}">
        <select class="type-sel">${typeOpts(t.type)}</select>
        <input class="hrs-in" type="number" min="0" max="24" step="0.5" placeholder="hrs" value="${t.hours}">
        <button class="rm-btn"><i class="ti ti-x"></i></button>`;
      row.querySelector(".name-in").oninput = e => { t.name = e.target.value; };
      row.querySelector(".type-sel").onchange = e => { t.type = e.target.value; };
      row.querySelector(".hrs-in").oninput = e => { t.hours = e.target.value; calcHours(); };
      row.querySelector(".rm-btn").onclick = () => { aTests = aTests.filter(x=>x.id!==t.id); rebuildTests(); calcHours(); };
      list.appendChild(row);
    });
    calcHours();
  };

  const rebuildMeetings = () => {
    const list = wrap.querySelector("#meet-list");
    list.innerHTML = "";
    aMeetings.forEach(m => {
      const row = document.createElement("div");
      row.className = "row-item meet-grid";
      row.innerHTML = `
        <input class="mname-in" placeholder="e.g. Sprint review" value="${m.name}">
        <select class="mtype-sel">${MEETING_TYPES.map(x=>`<option value="${x}" ${m.mtype===x?"selected":""}>${x}</option>`).join("")}</select>
        <input class="mhrs-in" type="number" min="0" max="24" step="0.5" placeholder="hrs" value="${m.hours}">
        <button class="rm-btn"><i class="ti ti-x"></i></button>`;
      row.querySelector(".mname-in").oninput = e => { m.name = e.target.value; };
      row.querySelector(".mtype-sel").onchange = e => { m.mtype = e.target.value; };
      row.querySelector(".mhrs-in").oninput = e => { m.hours = e.target.value; calcHours(); };
      row.querySelector(".rm-btn").onclick = () => { aMeetings = aMeetings.filter(x=>x.id!==m.id); rebuildMeetings(); calcHours(); };
      list.appendChild(row);
    });
    calcHours();
  };

  wrap.innerHTML = `
    <div style="margin-bottom:1rem">
      <button class="btn btn-outline" id="btn-back"><i class="ti ti-arrow-left"></i> Back</button>
    </div>
    <h1><i class="ti ti-chart-bar"></i> Daily productivity log</h1>
    <p class="subtitle">Fill in all your details and click Submit. Data goes directly to the master dashboard.</p>
    ${!firebaseReady ? `<div class="setup-notice"><strong>⚠️ Firebase not configured</strong>Data will be saved locally on this device only. To sync across devices, add your Firebase config in the HTML file.</div>` : ""}

    <div class="section">
      <div class="sec-title"><i class="ti ti-user"></i> Associate details</div>
      <div class="row2">
        <div class="field"><label>Name<span class="req">*</span></label>
          <select id="sel-name"><option value="">Select name…</option>${ASSOCIATES.map(a=>`<option>${a}</option>`).join("")}</select></div>
        <div class="field"><label>Date<span class="req">*</span></label>
          <input type="date" id="sel-date" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Team / project<span class="req">*</span></label>
          <input type="text" id="sel-team" readonly placeholder="Auto-filled when name is selected" style="background:#f5f5f0;color:#555;cursor:default;"></div>
        <div class="field"><label>Total work hours</label>
          <input type="number" id="wd" min="1" max="24" step="0.5" value="9"></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-bug"></i> Testing activities</div>
      <div class="col-hd test-grid"><span>Testing item / description</span><span>Type</span><span>Hours</span><span></span></div>
      <div id="test-list"></div>
      <button class="add-btn" id="add-test"><i class="ti ti-plus"></i> Add testing item</button>
      <div class="total-bar"><span>Total testing hours</span><strong id="t-total">0 hrs</strong></div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-users"></i> Meetings attended</div>
      <div class="col-hd meet-grid"><span>Meeting name</span><span>Meeting type</span><span>Hours</span><span></span></div>
      <div id="meet-list"></div>
      <button class="add-btn" id="add-meet"><i class="ti ti-plus"></i> Add meeting</button>
      <div class="total-bar"><span>Total meeting hours</span><strong id="m-total">0 hrs</strong></div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-calendar-stats"></i> Day summary</div>
      <div class="sum-grid">
        <div class="sum-card"><div class="lbl">Testing</div><div class="val" id="s-test">0</div><div class="unt">hours</div></div>
        <div class="sum-card"><div class="lbl">Meetings</div><div class="val" id="s-meet">0</div><div class="unt">hours</div></div>
        <div class="sum-card"><div class="lbl">Other / buffer</div><div class="val" id="s-other">9</div><div class="unt">hours</div></div>
      </div>
      <div class="warn-txt" id="warn"><i class="ti ti-alert-triangle"></i> Hours exceed total work hours.</div>
    </div>

    <div class="err-msg" id="err"><i class="ti ti-alert-circle"></i> Please fill in name, date, and team.</div>
    <div class="actions">
      <button class="btn-submit" id="btn-submit"><i class="ti ti-send"></i> Submit</button>
    </div>`;

  wrap.querySelector("#btn-back").onclick = () => { aTests = []; aMeetings = []; currentView = "landing"; render(); };
  wrap.querySelector("#sel-name").onchange = e => {
    const selected = e.target.value;
    const teamInput = wrap.querySelector("#sel-team");
    teamInput.value = ASSOCIATE_TEAMS[selected] || "";
  };
  wrap.querySelector("#wd").oninput = calcHours;
  wrap.querySelector("#add-test").onclick = () => { aTests.push({ id: uid(), name: "", type: MANUAL_TYPES[0], hours: "" }); rebuildTests(); };
  wrap.querySelector("#add-meet").onclick = () => { aMeetings.push({ id: uid(), name: "", mtype: MEETING_TYPES[0], hours: "" }); rebuildMeetings(); };

  wrap.querySelector("#btn-submit").onclick = async () => {
    const name = wrap.querySelector("#sel-name").value;
    const date = wrap.querySelector("#sel-date").value;
    const team = wrap.querySelector("#sel-team").value;
    const err  = wrap.querySelector("#err");
    if (!name || !date || !team) { err.style.display = "flex"; return; }
    err.style.display = "none";
    const btn = wrap.querySelector("#btn-submit");
    btn.disabled = true; btn.innerHTML = `<i class="ti ti-loader"></i> Submitting…`;
    const wd = parseFloat(wrap.querySelector("#wd").value)||9;
    const tH = aTests.reduce((s,t)=>s+(parseFloat(t.hours)||0),0);
    const mH = aMeetings.reduce((s,m)=>s+(parseFloat(m.hours)||0),0);
    const payload = {
      id: uid(), submittedAt: new Date().toISOString(),
      name, date, team, workday: wd,
      testingHrs: tH.toFixed(1), meetingHrs: mH.toFixed(1), otherHrs: Math.max(0,wd-tH-mH).toFixed(1),
      tests: aTests.map(t=>({ name:t.name, category:MANUAL_TYPES.includes(t.type)?"Manual":"Automation", type:t.type, hours:parseFloat(t.hours)||0 })),
      meetings: aMeetings.map(m=>({ name:m.name, mtype:m.mtype, hours:parseFloat(m.hours)||0 })),
    };
    await addSubmission(payload);
    submittedEntry = payload;
    aTests = []; aMeetings = [];
    currentView = "success"; render();
  };

  rebuildTests(); rebuildMeetings();
  return wrap;
}

// ─── SUCCESS ──────────────────────────────────────────────────────
function renderSuccess() {
  const wrap = document.createElement("div");
  wrap.className = "success";
  wrap.innerHTML = `
    <div class="success-icon"><i class="ti ti-check"></i></div>
    <h2>Submitted successfully!</h2>
    <p>Your data for <strong>${submittedEntry?.date||""}</strong> has been sent directly to the master dashboard.</p>
    <div class="success-note"><i class="ti ti-info-circle"></i> The master will review and finalise your entry.</div>`;
  return wrap;
}

// ─── LOGIN ────────────────────────────────────────────────────────
let pinErr = false;
function renderLogin() {
  const wrap = document.createElement("div");
  wrap.className = "login-wrap";
  wrap.innerHTML = `
    <div class="login-card">
      <div style="font-size:36px;color:#2a6dd9;margin-bottom:12px"><i class="ti ti-lock"></i></div>
      <h2>Master dashboard</h2>
      <p>Enter your 4-digit PIN</p>
      <div class="pin-row">
        ${[0,1,2,3].map(i=>`<input type="password" maxlength="1" inputmode="numeric" id="pin-${i}" class="${pinErr?"err":""}">`).join("")}
      </div>
      <button class="btn btn-primary" id="unlock-btn" style="width:100%;justify-content:center">Unlock</button>
      <p class="login-err" id="login-err" ${pinErr?"style='display:block'":""}>Incorrect PIN. Try again.</p>
      <p class="login-hint">Default PIN: 1234</p>
    </div>`;

  const inputs = [0,1,2,3].map(i => wrap.querySelector(`#pin-${i}`));
  inputs.forEach((inp, i) => {
    inp.oninput = () => {
      if (inp.value && i < 3) inputs[i+1].focus();
      if (inp.value && i === 3) tryUnlock();
    };
  });
  wrap.querySelector("#unlock-btn").onclick = tryUnlock;
  function tryUnlock() {
    const pin = inputs.map(x=>x.value).join("");
    if (pin === MASTER_PIN) { pinErr = false; currentView = "master"; render(); }
    else { pinErr = true; render(); }
  }
  setTimeout(() => inputs[0]?.focus(), 50);
  return wrap;
}

// ─── MASTER DASHBOARD ─────────────────────────────────────────────
let masterSubs = [];
let expandedId = null;
let stopListening = null;

function renderMaster() {
  const wrap = document.createElement("div");

  const buildContent = (subs) => {
    masterSubs = subs;
    const avgT = subs.length ? (subs.reduce((a,s)=>a+parseFloat(s.testingHrs||0),0)/subs.length).toFixed(1) : "—";
    const avgM = subs.length ? (subs.reduce((a,s)=>a+parseFloat(s.meetingHrs||0),0)/subs.length).toFixed(1) : "—";
    const people = new Set(subs.map(s=>s.name)).size;

    wrap.innerHTML = `
      <div class="dash-header">
        <h1><i class="ti ti-layout-dashboard"></i> Master dashboard</h1>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline" id="exp-btn"><i class="ti ti-download"></i> Export CSV</button>
        </div>
      </div>
      ${!firebaseReady ? `<div class="setup-notice"><strong>⚠️ Firebase not configured — data is local only</strong>To receive submissions from associates on other devices, add Firebase config in the HTML file.</div>` : ""}
      <div class="stat-row">
        <div class="stat-card"><div class="slbl">Submissions</div><div class="sval">${subs.length}</div></div>
        <div class="stat-card"><div class="slbl">Associates</div><div class="sval">${people}</div></div>
        <div class="stat-card"><div class="slbl">Avg testing hrs</div><div class="sval">${avgT}</div></div>
        <div class="stat-card"><div class="slbl">Avg meeting hrs</div><div class="sval">${avgM}</div></div>
      </div>
      <div class="sub-list">
        <div class="sub-list-hd"><h3>Submissions</h3><span class="count-badge">${subs.length} ${subs.length===1?"entry":"entries"}</span></div>
        <div id="sub-items">
          ${subs.length === 0 ? `<div class="empty"><i class="ti ti-inbox"></i>No submissions yet. Associates will appear here automatically.</div>` : subs.map((s,i) => buildSubHTML(s,i)).join("")}
        </div>
      </div>`;

    wrap.querySelector("#exp-btn").onclick = exportCSV;

    subs.forEach((s, i) => {
      const row = wrap.querySelector(`#srow-${i}`);
      if (!row) return;
      row.onclick = () => {
        expandedId = expandedId === s.id ? null : s.id;
        buildContent(masterSubs);
      };
      const detail = wrap.querySelector(`#detail-${i}`);
      if (detail && expandedId === s.id) {
        detail.classList.add("open");
        wireDetail(wrap, s, i);
      }
    });
  };

  // Start real-time listener
  if (stopListening) stopListening();
  if (firebaseReady) {
    stopListening = listenSubmissions(subs => buildContent(subs));
  } else {
    loadSubmissions().then(subs => buildContent(subs));
    stopListening = null;
  }

  buildContent(masterSubs);
  return wrap;
}

function buildSubHTML(s, i) {
  const initials = (s.name||"?").slice(0,2).toUpperCase();
  const time = new Date(s.submittedAt).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  return `
    <div class="sub-item">
      <div class="sub-row" id="srow-${i}">
        <div class="avatar">${initials}</div>
        <div>
          <div class="sub-name">${s.name} <span style="font-weight:400;color:#888;font-size:13px">· ${s.team||""}</span></div>
          <div class="sub-meta">${s.date} &nbsp;·&nbsp; ${time}</div>
        </div>
        <div class="badges">
          <span class="badge badge-t"><i class="ti ti-bug"></i> ${s.testingHrs}h</span>
          <span class="badge badge-m"><i class="ti ti-users"></i> ${s.meetingHrs}h</span>
        </div>
        <i class="ti ti-chevron-down chev ${expandedId===s.id?"open":""}"></i>
      </div>
      <div class="sub-detail" id="detail-${i}">
        ${buildDetailHTML(s, i)}
      </div>
    </div>`;
}

function buildDetailHTML(s, i) {
  const tests = (s.tests||[]).map((t,ti)=>`
    <div class="row-item etest-grid" data-ti="${ti}">
      <input class="et-name sm" value="${(t.name||"").replace(/"/g,"&quot;")}">
      <select class="et-type sm">${typeOpts(t.type)}</select>
      <input class="et-hrs sm" type="number" min="0" max="24" step="0.5" value="${t.hours||""}">
      <button class="rm-btn et-rm"><i class="ti ti-x"></i></button>
    </div>`).join("");
  const meets = (s.meetings||[]).map((m,mi)=>`
    <div class="row-item emeet-grid" data-mi="${mi}">
      <input class="em-name sm" value="${(m.name||"").replace(/"/g,"&quot;")}">
      <select class="em-mtype sm">${MEETING_TYPES.map(x=>`<option ${m.mtype===x?"selected":""}>${x}</option>`).join("")}</select>
      <input class="em-hrs sm" type="number" min="0" max="24" step="0.5" value="${m.hours||""}">
      <button class="rm-btn em-rm"><i class="ti ti-x"></i></button>
    </div>`).join("");
  return `
    <div class="detail-sec">
      <div class="detail-sec-title">Associate info</div>
      <div class="row2" style="margin-bottom:8px">
        <div class="field"><label>Name</label><select class="sm ed-name">${ASSOCIATES.map(a=>`<option ${s.name===a?"selected":""}>${a}</option>`).join("")}</select></div>
        <div class="field"><label>Date</label><input type="date" class="sm ed-date" value="${s.date}"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Team</label><select class="sm ed-team">${TEAMS.map(t=>`<option ${s.team===t?"selected":""}>${t}</option>`).join("")}</select></div>
        <div class="field"><label>Work hours</label><input type="number" class="sm ed-wd" min="1" max="24" step="0.5" value="${s.workday||9}"></div>
      </div>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-title">Testing activities</div>
      <div id="et-list-${i}">${tests}</div>
      <button class="add-btn sm et-add"><i class="ti ti-plus"></i> Add row</button>
    </div>
    <div class="detail-sec">
      <div class="detail-sec-title">Meetings</div>
      <div id="em-list-${i}">${meets}</div>
      <button class="add-btn sm em-add"><i class="ti ti-plus"></i> Add row</button>
    </div>
    <div class="detail-actions">
      <button class="btn btn-primary ed-save"><i class="ti ti-device-floppy"></i> Save changes</button>
      <button class="btn btn-danger ed-del"><i class="ti ti-trash"></i> Delete</button>
    </div>`;
}

function wireDetail(wrap, s, i) {
  const det = wrap.querySelector(`#detail-${i}`);
  if (!det) return;

  // editable local copy
  let ec = JSON.parse(JSON.stringify(s));
  ec.tests    = (ec.tests||[]).map(t=>({...t,_id:uid()}));
  ec.meetings = (ec.meetings||[]).map(m=>({...m,_id:uid()}));

  const recalc = () => {
    const tH = ec.tests.reduce((a,t)=>a+(parseFloat(t.hours)||0),0);
    const mH = ec.meetings.reduce((a,m)=>a+(parseFloat(m.hours)||0),0);
    ec.testingHrs = tH.toFixed(1);
    ec.meetingHrs = mH.toFixed(1);
    ec.otherHrs   = Math.max(0,(ec.workday||9)-tH-mH).toFixed(1);
  };

  const rebuildTests = () => {
    const list = det.querySelector(`#et-list-${i}`);
    list.innerHTML = ec.tests.map((t,ti)=>`
      <div class="row-item etest-grid">
        <input class="et-name sm" value="${(t.name||"").replace(/"/g,"&quot;")}">
        <select class="et-type sm">${typeOpts(t.type)}</select>
        <input class="et-hrs sm" type="number" min="0" max="24" step="0.5" value="${t.hours||""}">
        <button class="rm-btn" data-ti="${ti}"><i class="ti ti-x"></i></button>
      </div>`).join("");
    list.querySelectorAll(".et-name").forEach((inp,ti)=>{ inp.oninput=()=>{ec.tests[ti].name=inp.value;}; });
    list.querySelectorAll(".et-type").forEach((sel,ti)=>{ sel.onchange=()=>{ec.tests[ti].type=sel.value;ec.tests[ti].category=MANUAL_TYPES.includes(sel.value)?"Manual":"Automation";}; });
    list.querySelectorAll(".et-hrs").forEach((inp,ti)=>{ inp.oninput=()=>{ec.tests[ti].hours=parseFloat(inp.value)||0;recalc();}; });
    list.querySelectorAll(".rm-btn").forEach(btn=>{ btn.onclick=()=>{const ti=+btn.dataset.ti;ec.tests.splice(ti,1);recalc();rebuildTests();}; });
  };

  const rebuildMeets = () => {
    const list = det.querySelector(`#em-list-${i}`);
    list.innerHTML = ec.meetings.map((m,mi)=>`
      <div class="row-item emeet-grid">
        <input class="em-name sm" value="${(m.name||"").replace(/"/g,"&quot;")}">
        <select class="em-mtype sm">${MEETING_TYPES.map(x=>`<option ${m.mtype===x?"selected":""}>${x}</option>`).join("")}</select>
        <input class="em-hrs sm" type="number" min="0" max="24" step="0.5" value="${m.hours||""}">
        <button class="rm-btn" data-mi="${mi}"><i class="ti ti-x"></i></button>
      </div>`).join("");
    list.querySelectorAll(".em-name").forEach((inp,mi)=>{ inp.oninput=()=>{ec.meetings[mi].name=inp.value;}; });
    list.querySelectorAll(".em-mtype").forEach((sel,mi)=>{ sel.onchange=()=>{ec.meetings[mi].mtype=sel.value;}; });
    list.querySelectorAll(".em-hrs").forEach((inp,mi)=>{ inp.oninput=()=>{ec.meetings[mi].hours=parseFloat(inp.value)||0;recalc();}; });
    list.querySelectorAll(".rm-btn").forEach(btn=>{ btn.onclick=()=>{const mi=+btn.dataset.mi;ec.meetings.splice(mi,1);recalc();rebuildMeets();}; });
  };

  det.querySelector(".ed-name").onchange=e=>{ec.name=e.target.value;};
  det.querySelector(".ed-date").oninput=e=>{ec.date=e.target.value;};
  det.querySelector(".ed-team").onchange=e=>{ec.team=e.target.value;};
  det.querySelector(".ed-wd").oninput=e=>{ec.workday=parseFloat(e.target.value)||9;recalc();};
  det.querySelector(".et-add").onclick=()=>{ec.tests.push({_id:uid(),name:"",type:MANUAL_TYPES[0],category:"Manual",hours:0});rebuildTests();};
  det.querySelector(".em-add").onclick=()=>{ec.meetings.push({_id:uid(),name:"",mtype:MEETING_TYPES[0],hours:0});rebuildMeets();};

  det.querySelector(".ed-save").onclick=async()=>{
    recalc();
    const clean = {...ec, tests:ec.tests.map(({_id,...r})=>r), meetings:ec.meetings.map(({_id,...r})=>r)};
    await updateSubmission(clean);
    expandedId = null;
    showToast("Entry saved!");
    if (!firebaseReady) { loadSubmissions().then(subs=>{ masterSubs=subs; renderMasterContent(); }); }
  };

  det.querySelector(".ed-del").onclick=async()=>{
    if (!confirm("Delete this submission?")) return;
    await deleteSubmission(s.id);
    expandedId = null;
    showToast("Entry deleted.");
    if (!firebaseReady) { loadSubmissions().then(subs=>{ masterSubs=subs; renderMasterContent(); }); }
  };

  rebuildTests(); rebuildMeets();
}

function exportCSV() {
  if (!masterSubs.length) { showToast("No submissions to export."); return; }
  const rows = [["Associate","Date","Team","Work Hrs","Testing Hrs","Meeting Hrs","Other Hrs","Testing Item","Category","Test Type","Test Hours","Meeting Name","Meeting Type","Meeting Hours"]];
  masterSubs.forEach(s=>{
    const ts=s.tests||[],ms=s.meetings||[];
    const max=Math.max(ts.length,ms.length,1);
    for(let i=0;i<max;i++){
      const t=ts[i]||{},m=ms[i]||{};
      rows.push([i===0?s.name:"",i===0?s.date:"",i===0?s.team:"",i===0?s.workday:"",i===0?s.testingHrs:"",i===0?s.meetingHrs:"",i===0?s.otherHrs:"",t.name||"",t.category||"",t.type||"",t.hours||"",m.name||"",m.mtype||"",m.hours||""]);
    }
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`productivity_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); showToast("CSV exported!");
}

// ─── Helpers ──────────────────────────────────────────────────────
function typeOpts(sel) {
  return `<optgroup label="Manual testing">${MANUAL_TYPES.map(t=>`<option value="${t}" ${sel===t?"selected":""}>${t}</option>`).join("")}</optgroup><optgroup label="Automation testing">${AUTO_TYPES.map(t=>`<option value="${t}" ${sel===t?"selected":""}>${t}</option>`).join("")}</optgroup>`;
}

// ─── Boot ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
